<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Benjamin Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-dark: #c53650;
            --success: #4caf50;
            --danger: #f44336;
            --text-light: #eaeaea;
            --text-muted: #a0a0a0;
            --card-bg: #0f0f1a;
            --input-bg: #1e1e30;
            --border: rgba(233, 69, 96, 0.2);
            --border-focus: rgba(233, 69, 96, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* 컨테이너 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 헤더 */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 1.8rem;
        }

        .admin-header .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-email {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 로그인 박스 */
        .login-box {
            max-width: 400px;
            margin: 5rem auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .login-box .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* 편집 카드 */
        .section-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }

        .section-card:hover {
            border-color: var(--border-focus);
        }

        .section-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-card h2 .icon {
            margin-right: 0.5rem;
        }

        /* 입력 필드 */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 아이템 카드 (리스트 항목 각각) */
        .item-card {
            background: var(--input-bg);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .item-card .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .item-card .item-title {
            color: var(--accent);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        /* 버튼 */
        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-full {
            width: 100%;
            margin-top: 1rem;
        }

        /* 태그 */
        .tag-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            padding: 0.5rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 42px;
        }

        .tag-chip {
            background: rgba(233, 69, 96, 0.15);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .tag-chip .remove {
            cursor: pointer;
            color: var(--accent);
            font-weight: bold;
        }

        .tag-chip .remove:hover {
            color: var(--danger);
        }

        .tag-input {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            padding: 0.2rem;
        }

        /* 알림 */
        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
            max-width: 400px;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--danger);
        }

        .notification.info {
            background: var(--secondary);
            border: 1px solid var(--accent);
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 숨김 */
        .hidden {
            display: none !important;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .admin-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .form-row,
            .form-row-3 {
                grid-template-columns: 1fr;
            }

            .login-box {
                margin: 2rem auto;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 🚨 알림 영역 -->
    <div id="notification" class="notification"></div>

    <!-- 🔐 로그인 화면 -->
    <div id="login-view" class="container">
        <div class="login-box">
            <h2>🔐 관리자 로그인</h2>
            <p class="subtitle">Benjamin 포트폴리오 관리 페이지</p>

            <div class="form-group">
                <label for="login-email">이메일</label>
                <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="login-password">비밀번호</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn btn-primary btn-full" onclick="handleLogin()">로그인</button>
            
            <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
                등록된 관리자만 접근 가능합니다.
            </p>
        </div>
    </div>

    <!-- ✏️ 편집 화면 (로그인 후 표시) -->
    <div id="admin-view" class="container hidden">
        <!-- 헤더 -->
        <div class="admin-header">
            <h1>✏️ 포트폴리오 관리</h1>
            <div class="actions">
                <span class="user-email" id="user-email"></span>
                <a href="/" target="_blank" class="btn btn-secondary btn-small">👀 사이트 미리보기</a>
                <button class="btn btn-secondary btn-small" onclick="handleLogout()">🚪 로그아웃</button>
            </div>
        </div>

        <!-- 📝 소개 섹션 -->
        <div class="section-card">
            <h2>
                <span><span class="icon">📝</span>소개 (About)</span>
                <button class="btn btn-primary btn-small" onclick="saveAbout()">💾 저장</button>
            </h2>
            <div id="about-form">
                <div class="loading"><div class="spinner"></div> 로딩 중...</div>
            </div>
        </div>

        <!-- 💼 경력 섹션 -->
        <div class="section-card">
            <h2>
                <span><span class="icon">💼</span>경력 (Career)</span>
                <button class="btn btn-primary btn-small" onclick="addCareer()">+ 새 경력 추가</button>
            </h2>
            <div id="career-list">
                <div class="loading"><div class="spinner"></div> 로딩 중...</div>
            </div>
        </div>

        <!-- 🎯 자기개발 섹션 -->
        <div class="section-card">
            <h2>
                <span><span class="icon">🎯</span>자기개발 (Skills)</span>
                <button class="btn btn-primary btn-small" onclick="addSkill()">+ 새 항목 추가</button>
            </h2>
            <div id="skills-list">
                <div class="loading"><div class="spinner"></div> 로딩 중...</div>
            </div>
        </div>

        <!-- 🤝 커뮤니티 섹션 -->
        <div class="section-card">
            <h2>
                <span><span class="icon">🤝</span>커뮤니티 (Community)</span>
                <button class="btn btn-primary btn-small" onclick="addCommunity()">+ 새 활동 추가</button>
            </h2>
            <div id="community-list">
                <div class="loading"><div class="spinner"></div> 로딩 중...</div>
            </div>
        </div>

        <!-- 📧 연락처 섹션 -->
        <div class="section-card">
            <h2>
                <span><span class="icon">📧</span>연락처 (Contact)</span>
                <button class="btn btn-primary btn-small" onclick="addContact()">+ 새 연락처 추가</button>
            </h2>
            <div id="contact-list">
                <div class="loading"><div class="spinner"></div> 로딩 중...</div>
            </div>
        </div>
    </div>

    <!-- Supabase 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ============================================
        // ⚠️ Supabase 연결 정보 (index.html과 동일하게!)
        // ============================================
        const SUPABASE_URL = 'https://nloebwytjunpabaphkdj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sb2Vid3l0anVucGFiYXBoa2RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzM4MDQsImV4cCI6MjA5MjQwOTgwNH0.jt_ziO3efAjCqErxFJ8OMacusAKSaCpG2YPrx9LJkS0';

        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // 유틸리티: 알림 표시
        // ============================================
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type} show`;
            notification.textContent = message;
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // 🔐 로그인/로그아웃 처리
        // ============================================
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showNotification('이메일과 비밀번호를 입력해주세요', 'error');
                return;
            }

            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                console.error('로그인 실패:', error);
                showNotification('로그인 실패: 허가된 계정이 아닙니다', 'error');
                return;
            }

            showNotification(`환영합니다, ${data.user.email}`, 'success');
            showAdminView(data.user);
        }

        async function handleLogout() {
            await db.auth.signOut();
            showNotification('로그아웃되었습니다', 'info');
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }

        // ============================================
        // 👀 편집 화면 전환
        // ============================================
        function showAdminView(user) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            document.getElementById('user-email').textContent = user.email;
            loadAllData();
        }

        // ============================================
        // 페이지 로드 시 기존 세션 확인
        // ============================================
        async function checkSession() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                showAdminView(session.user);
            }
        }

        // ============================================
        // 모든 데이터 로드
        // ============================================
        async function loadAllData() {
            await Promise.all([
                loadAbout(),
                loadCareer(),
                loadSkills(),
                loadCommunity(),
                loadContact()
            ]);
        }

        // ============================================
        // 📝 소개 섹션 — 로드 & 저장
        // ============================================
        let aboutData = null;

        async function loadAbout() {
            const { data, error } = await db.from('about').select('*').limit(1).single();
            if (error) {
                console.error('소개 로드 실패:', error);
                return;
            }
            aboutData = data;

            document.getElementById('about-form').innerHTML = `
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="about-title" value="${escapeAttr(data.title || '')}">
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <textarea id="about-description" rows="4">${escapeText(data.description || '')}</textarea>
                </div>
                <div class="form-row-3">
                    <div class="form-group">
                        <label>경력 (년)</label>
                        <input type="number" id="about-years" value="${data.years_of_career || 0}">
                    </div>
                    <div class="form-group">
                        <label>프로젝트 수</label>
                        <input type="number" id="about-projects" value="${data.project_count || 0}">
                    </div>
                    <div class="form-group">
                        <label>커뮤니티 수</label>
                        <input type="number" id="about-community" value="${data.community_count || 0}">
                    </div>
                </div>
            `;
        }

        async function saveAbout() {
            const updates = {
                title: document.getElementById('about-title').value,
                description: document.getElementById('about-description').value,
                years_of_career: parseInt(document.getElementById('about-years').value) || 0,
                project_count: parseInt(document.getElementById('about-projects').value) || 0,
                community_count: parseInt(document.getElementById('about-community').value) || 0,
                updated_at: new Date().toISOString()
            };

            const { error } = await db.from('about').update(updates).eq('id', aboutData.id);

            if (error) {
                console.error('저장 실패:', error);
                showNotification('저장 실패: ' + error.message, 'error');
                return;
            }

            showNotification('✅ 소개 저장 완료', 'success');
        }

        // ============================================
        // 💼 경력 섹션 — 로드/추가/수정/삭제
        // ============================================
        async function loadCareer() {
            const { data, error } = await db.from('career').select('*').order('sort_order');
            if (error) {
                console.error('경력 로드 실패:', error);
                return;
            }

            const container = document.getElementById('career-list');
            if (data.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">등록된 경력이 없습니다</p>';
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="item-card" data-id="${item.id}">
                    <div class="item-header">
                        <span class="item-title">경력 #${item.id}</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary btn-small" onclick="saveCareer(${item.id})">💾 저장</button>
                            <button class="btn btn-danger" onclick="deleteCareer(${item.id})">🗑️ 삭제</button>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>기간</label>
                            <input type="text" data-field="period" value="${escapeAttr(item.period || '')}" placeholder="예: 2023 - 현재">
                        </div>
                        <div class="form-group">
                            <label>표시 순서 (작을수록 위)</label>
                            <input type="number" data-field="sort_order" value="${item.sort_order || 0}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>직무명</label>
                            <input type="text" data-field="title" value="${escapeAttr(item.title || '')}" placeholder="예: 시니어 엔지니어">
                        </div>
                        <div class="form-group">
                            <label>회사명</label>
                            <input type="text" data-field="company" value="${escapeAttr(item.company || '')}" placeholder="예: ABC 회사">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>설명</label>
                        <textarea data-field="description" rows="3">${escapeText(item.description || '')}</textarea>
                    </div>
                </div>
            `).join('');
        }

        async function addCareer() {
            const newItem = {
                period: '신규 경력',
                title: '새 직무',
                company: '회사명',
                description: '',
                sort_order: 99
            };
            const { error } = await db.from('career').insert(newItem);
            if (error) {
                showNotification('추가 실패: ' + error.message, 'error');
                return;
            }
            showNotification('✅ 새 경력이 추가되었습니다', 'success');
            loadCareer();
        }

        async function saveCareer(id) {
            const card = document.querySelector(`.item-card[data-id="${id}"]`);
            const updates = {
                period: card.querySelector('[data-field="period"]').value,
                title: card.querySelector('[data-field="title"]').value,
                company: card.querySelector('[data-field="company"]').value,
                description: card.querySelector('[data-field="description"]').value,
                sort_order: parseInt(card.querySelector('[data-field="sort_order"]').value) || 0
            };

            const { error } = await db.from('career').update(updates).eq('id', id);
            if (error) {
                showNotification('저장 실패: ' + error.message, 'error');
                return;
            }
            showNotification('✅ 경력 저장 완료', 'success');
        }

        async function deleteCareer(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            const { error } = await db.from('career').delete().eq('id', id);
            if (error) {
                showNotification('삭제 실패: ' + error.message, 'error');
                return;
            }
            showNotification('🗑️ 삭제 완료', 'success');
            loadCareer();
        }

        // ============================================
        // 🎯 자기개발 섹션 — 로드/추가/수정/삭제 + 태그
        // ============================================
        async function loadSkills() {
            const { data, error } = await db.from('skills').select('*').order('sort_order');
            if (error) {
                console.error('자기개발 로드 실패:', error);
                return;
            }

            const container = document.getElementById('skills-list');
            if (data.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center;">등록된 항목이 없습니다</p>';
                return;
            }

            container.innerHTML = data.map(item => {
                const tags = item.tags || [];
                const tagsHtml = tags.map((tag, idx) => `
                    <span class="tag-chip">
                        ${escapeText(tag)}
                        <span class="remove" onclick="removeTag(${item.id}, ${idx})">✕</span>
                    </span>
                `).join('');

                return `
                <div class="item-card" data-id="${item.id}">
                    <div class="item-header">
                        <span class="item-title">자기개발 #${item.id}</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-primary btn-small" onclick="saveSkill(${item.id})">💾 저장</button>
                            <button class="btn btn-danger" onclick="deleteSkill(${item.id})">🗑️ 삭제</button>
                        </div>
                    </div>
                    <div class="form-row-3">
                        <div class="form-group">
                            <label>카테고리</label>
                            <select data-field="category">
                                <option value="tech" ${item.category === 'tech' ? 'selected' : ''}>tech (기술)</option>
                                <option value="learning" ${item.category === 'learning' ? 'selected' : ''}>learning (학습)</option>
                                <option value="project" ${item.category === 'project' ? 'selected' : ''}>project (프로젝트)</option>
                                <option value="goal" ${item.category === 'goal' ? 'selected' : ''}>goal (목표)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>아이콘 (이모지)</label>
                            <input type="text" data-field="icon" value="${escapeAttr(item.icon || '')}" placeholder="💻">
                        </div>
                        <div class="form-group">
                            <label>표시 순서</label>
                            <input type="number" data-field="sort_order" value="${item.sort_order || 0}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" data-field="title" value="${escapeAttr(item.title || '')}" placeholder="예: 기술 역량">
                    </div>
                    <div class="form-group">
                        <label>설명</label>
                        <textarea data-field="description" rows="2">${escapeText(item.description || '')}</textarea>
                    </div>
                    <div class="form-group">
                        <label>태그 (엔터로 추가)</label>
                        <div class="tag-input-wrapper" data-id="${item.id}">
                            ${tagsHtml}
                            <input type="text" class="tag-input" placeholder="태그 입력 후 엔터" 
                                onkeydown="handleTagKeydown(event, ${item.id})">
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function addSkill() {
            const newItem = {
                category: 'tech',
                icon: '📌',
                title: '새 항목',
                description: '',
                tags: [],
                sort_order: 99
            };
            const { error } = await db.from('skills').insert(newItem);
            if (error) {
                showNotification('추가 실패: ' + error.message, 'error');
                return;
            }
            showNotification('✅ 새 항목이 추가되었습니다', 'success');
            loadSkills();
        }

        async function saveSkill(id) {
            const card = document.querySelector(`.item-card[data-id="${id}"]`);
            // 현재 표시된 태그들을 배열로 수집
            const tags = Array.from(card.querySelectorAll('.tag-chip'))
                .map(chip => chip.childNodes[0].textContent.trim());

            const updates = {
                category: card.querySelector('[data-field="category"]').value,
                icon: card.querySelector('[data-field="icon"]').value,
                title: card.querySelector('[data-field="title"]').value,
                description: card.querySelector('[data-field="description"]').value,
                sort_order: parseInt(card.querySelector('[data-field="sort_order"]').value) || 0,
                tags: tags
            };

            const { error } = await db.from('skills').update(updates).eq('id', id);
            if (error) {
                showNotification('저장 실패: ' + error.message, 'error');
                return;
            }
            showNotification('✅ 자기개발 저장 완료', 'success');
        }

        async function deleteSkill(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            const { error } = await db.from('skills').delete().eq('id', id);
            if (error) {
                showNotification('삭제 실패: ' + error.message, 'error');
                return;
            }
            showNotification('🗑️ 삭제 완료', 'success');
            loadSkills();
        }

        // 태그 입력 처리 (엔터 시 추가)
        function handleTagKeydown(event, id) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const input = event.target;
                const tag = input.value.trim();
                if (!tag) return;

                const wrapper = input.parentElement;
                const chip = document.createElement('span');
                chip.className = 'tag-chip';
                chip.innerHTML = `${escapeText(tag)}<span class="remove" onclick="this.parentElement.remove()">✕</span>`;
                wrapper.insertBefore(chip, input);
                input.value = '';
            }
        }

        // 태그 제거 (저장하기 전엔 화면에서만 제거됨)
        function removeTag(skillId, tagIndex) {
            const chips = document.querySelectorAll(`.item-card[data-id="${skillId}"] .tag-chip`);
            if (chips[tagIndex]) chips[tagIndex].remove();
        }

        // ============================================

                    <div class="form-row">

        // ============================================
        // 유틸리티: HTML 이스케이프 (보안)
        // ============================================
        function escapeAttr(text) {
            if (text === null || text === undefined) return '';
            return String(text).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function escapeText(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // 엔터 키로 로그인
        // ============================================
        document.getElementById('login-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // ============================================
        // 페이지 시작 시 세션 체크
        // ============================================
        checkSession();
